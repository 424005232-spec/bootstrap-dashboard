<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StudentHub | Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <style>
    :root {
      --bs-primary: #7c3aed; 
      --bg-dark: #0f172a;
    }

    body { 
      background-color: var(--bg-dark); 
      color: white; 
      margin: 0; 
      font-family: sans-serif;
    }

    .sidebar {
      width: 280px;
      background: #1e293b !important;
      min-height: 100vh;
      border-right: 1px solid rgba(255,255,255,0.1);
      display: flex !important; /* Force show */
    }

    .profile-img {
      width: 50px !important;
      height: 50px !important;
      object-fit: cover;
      border-radius: 50%;
    }

    .stat-card { border: none; border-radius: 12px; color: white; margin-bottom: 20px; }
    .blue-gradient { background: linear-gradient(135deg, #3b82f6, #1e40af); }
    .pink-gradient { background: linear-gradient(135deg, #ec4899, #7c3aed); }
    .green-gradient { background: linear-gradient(135deg, #10b981, #059669); }

    .main-btn { 
      background-color: var(--bs-primary); 
      color: white; 
      border: none; 
      border-radius: 8px; 
    }

    .nav-link { color: rgba(255,255,255,0.6) !important; }
    .nav-link.active { color: white !important; font-weight: bold; }
  </style>
</head>
<body>

<div class="d-flex">
  <!-- Sidebar -->
  <div class="sidebar flex-column p-4">
    <div class="logo mb-5">
      <i class="bi bi-mortarboard-fill me-2 text-primary"></i>
      <span class="h4 fw-bold">StudentHub</span>
    </div>
    <ul class="nav flex-column mb-auto">
      <li class="nav-item mb-2"><a class="nav-link active" href="#"><i class="bi bi-grid-1x2-fill me-3"></i>Dashboard</a></li>
      <li class="nav-item mb-2"><a class="nav-link" href="#"><i class="bi bi-check2-square me-3"></i>Tasks</a></li>
      <li class="nav-item mb-2"><a class="nav-link" href="#"><i class="bi bi-chat-dots me-3"></i>Messages</a></li>
      <li class="nav-item mb-2"><a class="nav-link" href="#"><i class="bi bi-gear me-3"></i>Settings</a></li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="main-content flex-grow-1">
    <nav class="navbar navbar-expand-lg navbar-dark px-4 py-3">
      <div class="container-fluid p-0">
        <span class="navbar-brand fw-bold">Dashboard</span>
        <div class="ms-auto d-flex align-items-center">
          <span class="text-white small fw-bold me-3">Rossel(Dev Mode)</span>
          <!-- Path must match your folder[cite: 1] -->
          <img src="images/profile_puppy.jpg" class="profile-img border border-2 border-primary" alt="Profile">
        </div>
      </div>
    </nav>

    <div class="container-fluid px-4 mt-4">
      <div class="row g-4 mb-4">
        <div class="col-md-4"><div class="card stat-card blue-gradient p-4"><h6>Active Tasks</h6><h2 class="fw-bold">12</h2></div></div>
        <div class="col-md-4"><div class="card stat-card pink-gradient p-4"><h6>Messages</h6><h2 class="fw-bold">5</h2></div></div>
        <div class="col-md-4"><div class="card stat-card green-gradient p-4"><h6>Completed</h6><h2 class="fw-bold">8</h2></div></div>
      </div>
      
      <div class="bg-secondary bg-opacity-10 p-5 text-center rounded-4 border border-secondary border-opacity-25">
        <h4 class="mb-4">Need Assistance?</h4>
        <button class="btn main-btn px-5 py-3 shadow" data-bs-toggle="modal" data-bs-target="#contactModal">
          Open Contact Form
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal[cite: 1] -->
<div class="modal fade" id="contactModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white border-secondary">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold">Contact Form</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form class="needs-validation" novalidate>
          <div class="mb-3">
            <label class="form-label text-white-50 small">Full Name</label>
            <input type="text" class="form-control bg-secondary text-white border-0" required>
            <div class="invalid-feedback">Field is required.[cite: 1]</div>
          </div>
          <div class="mb-3">
            <label class="form-label text-white-50 small">Email Address</label>
            <input type="email" class="form-control bg-secondary text-white border-0" required>
            <div class="invalid-feedback">Valid email required.[cite: 1]</div>
          </div>
          <div class="mb-4">
            <label class="form-label text-white-50 small">Message (Min 20 chars)</label>
            <textarea class="form-control bg-secondary text-white border-0" rows="3" minlength="20" required></textarea>
            <div class="invalid-feedback">Min 20 characters required.[cite: 1]</div>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-bold">Submit</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Validation Logic[cite: 1] -->
<script>
  (function () {
    'use strict'
    var forms = document.querySelectorAll('.needs-validation')
    Array.prototype.slice.call(forms).forEach(function (form) {
      form.addEventListener('submit', function (event) {
        if (!form.checkValidity()) {
          event.preventDefault()
          event.stopPropagation()
        }
        form.classList.add('was-validated')
      }, false)
    })
  })()
</script>

</body>
</html>
