<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StudentHub | Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <!-- Part B: Link to External CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="d-flex">
  <!-- Sidebar -->
  <div class="sidebar flex-column p-4">
    <div class="logo mb-5">
      <i class="bi bi-mortarboard-fill me-2 text-primary"></i>
      <span class="h4 fw-bold">StudentHub</span>
    </div>
    <ul class="nav flex-column mb-auto">
      <li class="nav-item mb-2"><a class="nav-link active" href="#"><i class="bi bi-grid-1x2-fill me-3"></i>Dashboard</a></li>
      <li class="nav-item mb-2"><a class="nav-link" href="#"><i class="bi bi-check2-square me-3"></i>Tasks</a></li>
      <li class="nav-item mb-2"><a class="nav-link" href="#"><i class="bi bi-chat-dots me-3"></i>Messages</a></li>
      <li class="nav-item mb-2"><a class="nav-link" href="#"><i class="bi bi-gear me-3"></i>Settings</a></li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="main-content flex-grow-1">
    <nav class="navbar navbar-expand-lg navbar-dark px-4 py-3">
      <div class="container-fluid p-0">
        <span class="navbar-brand fw-bold">Dashboard</span>
        <div class="ms-auto d-flex align-items-center">
          <span class="text-white small fw-bold me-3">Rossel(Dev Mode)</span>
          <img src="images/profile_puppy.jpg" class="profile-img border border-2 border-primary" alt="Profile">
        </div>
      </div>
    </nav>

    <div class="container-fluid px-4 mt-4">
      <div class="row g-4 mb-4">
        <div class="col-md-4"><div class="card stat-card blue-gradient p-4"><h6>Active Tasks</h6><h2 class="fw-bold">12</h2></div></div>
        <div class="col-md-4"><div class="card stat-card pink-gradient p-4"><h6>Messages</h6><h2 class="fw-bold">5</h2></div></div>
        <div class="col-md-4"><div class="card stat-card green-gradient p-4"><h6>Completed</h6><h2 class="fw-bold">8</h2></div></div>
      </div>
      
      <div class="bg-secondary bg-opacity-10 p-5 text-center rounded-4 border border-secondary border-opacity-25">
        <h4 class="mb-4">Need Assistance?</h4>
        <button class="btn main-btn px-5 py-3 shadow" data-bs-toggle="modal" data-bs-target="#contactModal">
          Open Contact Form
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="contactModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white border-secondary">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold">Contact Form</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form class="needs-validation" novalidate>
          <div class="mb-3">
            <label class="form-label text-white-50 small">Full Name</label>
            <input type="text" class="form-control bg-secondary text-white border-0" required>
            <div class="invalid-feedback">Field is required.</div>
          </div>
          <div class="mb-3">
            <label class="form-label text-white-50 small">Email Address</label>
            <input type="email" class="form-control bg-secondary text-white border-0" required>
            <div class="invalid-feedback">Valid email required.</div>
          </div>
          <div class="mb-4">
            <label class="form-label text-white-50 small">Message (Min 20 chars)</label>
            <textarea class="form-control bg-secondary text-white border-0" rows="3" minlength="20" required></textarea>
            <div class="invalid-feedback">Min 20 characters required.</div>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-bold">Submit</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Part B: Link to External JS -->
<script src="js/script.js"></script>

</body>
</html>
